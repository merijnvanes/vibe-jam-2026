<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Jam 2026 — Isometric Prototype</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0c18; cursor: none; }
  canvas { display: block; }
  #ui {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(220, 200, 170, 0.5); font-family: 'Georgia', serif;
    font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
    pointer-events: none; user-select: none;
    text-shadow: 0 0 12px rgba(255, 180, 80, 0.3);
  }
  #cursor {
    position: fixed; width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255, 220, 150, 0.7); pointer-events: none;
    box-shadow: 0 0 8px rgba(255, 180, 80, 0.5), 0 0 16px rgba(255, 120, 40, 0.2);
    transform: translate(-50%, -50%); z-index: 1000;
  }
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    background: #0a0c18; color: rgba(220, 200, 170, 0.4); font-family: 'Georgia', serif;
    font-size: 16px; letter-spacing: 5px; z-index: 2000;
    transition: opacity 1.5s ease;
  }
  #loading.fade { opacity: 0; pointer-events: none; }
  #loading .sub {
    font-size: 11px; letter-spacing: 3px; opacity: 0.4;
  }
  #click-prompt {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
    background: rgba(10, 12, 24, 0.85); color: rgba(220, 200, 170, 0.6);
    font-family: 'Georgia', serif; font-size: 14px; letter-spacing: 3px;
    z-index: 1500; cursor: pointer; display: none;
  }
  #click-prompt .sub { font-size: 11px; opacity: 0.4; letter-spacing: 2px; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="loading">
  DRIFTING IN...
  <div class="sub">a world awaits</div>
</div>
<div id="click-prompt">
  CLICK TO ENTER
  <div class="sub">sound will begin</div>
</div>
<div id="cursor"></div>
<div id="ui">WASD to wander &middot; explore the village</div>
<script type="module" src="world.js"></script>
</body>
</html>
