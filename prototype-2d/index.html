<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Jam 2026 — Pixel World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden; background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    height: 100vh;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: none;
  }
  #ui {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.5); font-family: monospace;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    pointer-events: none; user-select: none;
  }
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #1a1a2e; color: rgba(255, 255, 255, 0.4); font-family: monospace;
    font-size: 14px; letter-spacing: 4px; z-index: 2000;
    transition: opacity 1.5s ease;
  }
  #loading.fade { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="loading">. . .</div>
<canvas id="game"></canvas>
<div id="ui">arrow keys to move</div>
<script src="world.js"></script>
</body>
</html>
