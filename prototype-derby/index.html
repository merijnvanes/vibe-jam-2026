<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demolition Derby</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; }
  #loading {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #1a1008; z-index: 2000;
    transition: opacity 1.5s ease;
  }
  #loading.fade { opacity: 0; pointer-events: none; }
  #loading h1 {
    color: #ff6b2b; font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: 48px; letter-spacing: 6px; text-transform: uppercase;
    text-shadow: 0 0 30px rgba(255,100,30,0.5), 0 0 60px rgba(255,50,0,0.3);
    margin-bottom: 20px;
  }
  #loading p {
    color: rgba(255, 180, 120, 0.6); font-family: 'Arial', sans-serif;
    font-size: 14px; letter-spacing: 3px; text-transform: uppercase;
  }
  #loading .bar-bg {
    width: 300px; height: 4px; background: rgba(255,100,30,0.15);
    border-radius: 2px; margin-top: 16px; overflow: hidden;
  }
  #loading .bar-fill {
    width: 0%; height: 100%; background: linear-gradient(90deg, #ff6b2b, #ffaa00);
    border-radius: 2px; transition: width 0.3s ease;
  }
  #hud {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 30px; align-items: center;
    font-family: 'Impact', 'Arial Black', sans-serif;
    pointer-events: none; user-select: none; z-index: 100;
  }
  #speed {
    color: #fff; font-size: 36px; letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(255,100,30,0.5);
  }
  #speed span { font-size: 16px; color: rgba(255,180,120,0.7); }
  #boost-bar {
    width: 120px; height: 8px; background: rgba(255,255,255,0.1);
    border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,100,30,0.3);
  }
  #boost-fill {
    width: 100%; height: 100%;
    background: linear-gradient(90deg, #ff6b2b, #ffaa00);
    border-radius: 4px; transition: width 0.1s;
  }
  #boost-label, #health-label {
    color: rgba(255,180,120,0.5); font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; font-family: 'Arial', sans-serif;
  }
  #health-bar {
    width: 120px; height: 8px; background: rgba(255,255,255,0.1);
    border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,50,30,0.3);
  }
  #health-fill {
    width: 100%; height: 100%;
    background: linear-gradient(90deg, #ff2200, #44ff44);
    border-radius: 4px; transition: width 0.2s;
  }
  #controls-hint {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,180,120,0.4); font-family: 'Arial', sans-serif;
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    pointer-events: none; user-select: none; z-index: 100;
    transition: opacity 3s ease;
  }
  #score-display {
    position: fixed; top: 20px; right: 20px;
    color: #ff6b2b; font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: 24px; letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(255,100,30,0.4);
    pointer-events: none; user-select: none; z-index: 100;
  }
  #score-display span { font-size: 13px; color: rgba(255,180,120,0.5); display: block; letter-spacing: 3px; font-family: 'Arial', sans-serif; }
  #wrecked-overlay {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.6); z-index: 150;
  }
  #wrecked-overlay.show { display: flex; }
  #wrecked-overlay h2 {
    color: #ff3300; font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: 64px; letter-spacing: 8px; text-transform: uppercase;
    text-shadow: 0 0 40px rgba(255,0,0,0.6);
    animation: pulse 0.5s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.05); }
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
    "@dimforge/rapier3d-compat": "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.14.0/rapier.es.js"
  }
}
</script>
</head>
<body>
<div id="loading">
  <h1>Demolition Derby</h1>
  <p>Warming up engines...</p>
  <div class="bar-bg"><div class="bar-fill" id="load-bar"></div></div>
</div>
<div id="controls-hint">WASD to drive &middot; SPACE to boost &middot; destroy everything</div>
<div id="hud">
  <div>
    <div id="speed"><span id="speed-value">0</span> <span>KM/H</span></div>
  </div>
  <div>
    <div id="boost-label">BOOST</div>
    <div id="boost-bar"><div id="boost-fill"></div></div>
  </div>
  <div>
    <div id="health-label">HP</div>
    <div id="health-bar"><div id="health-fill"></div></div>
  </div>
</div>
<div id="score-display">
  <span>WRECKS</span>
  <div id="score">0</div>
</div>
<div id="wrecked-overlay">
  <h2>WRECKED!</h2>
</div>
<script type="module" src="game.js"></script>
</body>
</html>
