<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wheel Position Tuner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; color: #ddd; font-family: monospace; display: flex; }
  canvas { display: block; }
  #controls {
    position: fixed; right: 0; top: 0; width: 320px; padding: 16px;
    background: rgba(0,0,0,0.85); height: 100vh; overflow-y: auto;
    font-size: 13px;
  }
  #controls h2 { color: #ff6b2b; margin-bottom: 12px; font-size: 16px; }
  #controls h3 { color: #ffaa44; margin: 12px 0 6px; font-size: 13px; }
  label { display: block; margin: 4px 0; }
  input[type="range"] { width: 180px; vertical-align: middle; }
  span.val { color: #ff6b2b; font-weight: bold; min-width: 50px; display: inline-block; }
  .group { border: 1px solid #333; padding: 8px; margin: 8px 0; border-radius: 4px; }
  #output { margin-top: 16px; padding: 10px; background: #222; border-radius: 4px; white-space: pre; font-size: 11px; color: #8f8; }
  button { background: #ff6b2b; color: #fff; border: none; padding: 8px 16px; cursor: pointer; border-radius: 4px; margin-top: 8px; font-weight: bold; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="controls">
  <h2>Wheel Position Tuner</h2>

  <h3>Front Wheels (steering)</h3>
  <div class="group">
    <label>X (width): <input type="range" id="fx" min="0.3" max="1.5" step="0.05" value="0.8"> <span class="val" id="fxv">0.8</span></label>
    <label>Y (height): <input type="range" id="fy" min="-0.8" max="0.2" step="0.05" value="-0.5"> <span class="val" id="fyv">-0.5</span></label>
    <label>Z (front-back): <input type="range" id="fz" min="-2.5" max="0" step="0.05" value="-1.35"> <span class="val" id="fzv">-1.35</span></label>
  </div>

  <h3>Rear Wheels (drive)</h3>
  <div class="group">
    <label>X (width): <input type="range" id="rx" min="0.3" max="1.5" step="0.05" value="0.8"> <span class="val" id="rxv">0.8</span></label>
    <label>Y (height): <input type="range" id="ry" min="-0.8" max="0.2" step="0.05" value="-0.5"> <span class="val" id="ryv">-0.5</span></label>
    <label>Z (front-back): <input type="range" id="rz" min="0" max="2.5" step="0.05" value="1.05"> <span class="val" id="rzv">1.05</span></label>
  </div>

  <h3>Wheel Size</h3>
  <div class="group">
    <label>Radius: <input type="range" id="wr" min="0.2" max="0.8" step="0.02" value="0.32"> <span class="val" id="wrv">0.32</span></label>
  </div>

  <h3>Suspension</h3>
  <div class="group">
    <label>Rest Length: <input type="range" id="sr" min="0.1" max="1.2" step="0.05" value="0.6"> <span class="val" id="srv">0.6</span></label>
  </div>

  <h3>Car Model Rotation</h3>
  <div class="group">
    <label>Y rotation: <input type="range" id="cr" min="0" max="6.28" step="0.05" value="1.57"> <span class="val" id="crv">1.57</span></label>
  </div>

  <div id="output">// Copy these values to game.js</div>
  <button onclick="copyOutput()">Copy to Clipboard</button>
</div>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2a2a);

const camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 320) / window.innerHeight, 0.1, 100);
camera.position.set(4, 3, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth - 320, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.prepend(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.5, 0);
controls.update();

// Lighting
scene.add(new THREE.AmbientLight(0x888888, 2));
const sun = new THREE.DirectionalLight(0xffffff, 3);
sun.position.set(5, 8, 3);
scene.add(sun);
scene.add(new THREE.HemisphereLight(0xffeedd, 0x665533, 1));

// Grid
scene.add(new THREE.GridHelper(10, 20, 0x444444, 0x333333));

// Axes
scene.add(new THREE.AxesHelper(2));

// Load car
let carGroup = new THREE.Group();
scene.add(carGroup);
const loader = new GLTFLoader();

let carMesh = null;
loader.loadAsync('assets/car.glb').then(gltf => {
  carMesh = gltf.scene;
  const box = new THREE.Box3().setFromObject(carMesh);
  const size = box.getSize(new THREE.Vector3());
  const scale = 4.2 / Math.max(size.x, size.z);
  carMesh.scale.setScalar(scale);
  carMesh.rotation.y = parseFloat(document.getElementById('cr').value);
  const box2 = new THREE.Box3().setFromObject(carMesh);
  const center = box2.getCenter(new THREE.Vector3());
  carMesh.position.sub(center);
  carMesh.traverse(c => { if (c.isMesh) { c.castShadow = true; } });
  carGroup.add(carMesh);
});

// Load wheel
let wheelTemplate = null;
loader.loadAsync('assets/wheel.glb').then(gltf => {
  wheelTemplate = gltf.scene;
  const box = new THREE.Box3().setFromObject(wheelTemplate);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 0.8 / maxDim;
  wheelTemplate.scale.setScalar(scale);
  const box2 = new THREE.Box3().setFromObject(wheelTemplate);
  const center = box2.getCenter(new THREE.Vector3());
  wheelTemplate.position.sub(center);
  wheelTemplate.traverse(c => { if (c.isMesh) c.castShadow = true; });
  updateWheels();
}).catch(() => {
  // Fallback cylinder
  wheelTemplate = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16).rotateZ(Math.PI/2),
    new THREE.MeshStandardMaterial({ color: 0x222222 })
  );
  updateWheels();
});

const wheels = [];
function updateWheels() {
  // Remove old wheels
  wheels.forEach(w => carGroup.remove(w));
  wheels.length = 0;
  if (!wheelTemplate) return;

  const fx = parseFloat(document.getElementById('fx').value);
  const fy = parseFloat(document.getElementById('fy').value);
  const fz = parseFloat(document.getElementById('fz').value);
  const rx = parseFloat(document.getElementById('rx').value);
  const ry = parseFloat(document.getElementById('ry').value);
  const rz = parseFloat(document.getElementById('rz').value);
  const wr = parseFloat(document.getElementById('wr').value);
  const sr = parseFloat(document.getElementById('sr').value);
  const wheelScale = wr / 0.4; // relative to default 0.4

  // Connection point Y = visual Y + suspension rest length
  // This compensates so the wheel appears at the slider position in-game
  const fcy = parseFloat((fy + sr).toFixed(2));
  const rcy = parseFloat((ry + sr).toFixed(2));

  const positions = [
    { x: -fx, y: fy, z: fz }, // front-left
    { x: fx, y: fy, z: fz },  // front-right
    { x: -rx, y: ry, z: rz }, // rear-left
    { x: rx, y: ry, z: rz },  // rear-right
  ];

  positions.forEach(pos => {
    const w = wheelTemplate.clone();
    w.scale.multiplyScalar(wheelScale);
    w.position.set(pos.x, pos.y, pos.z);
    carGroup.add(w);
    wheels.push(w);
  });

  // Output game-ready values (connection points compensated for suspension)
  const out = document.getElementById('output');
  out.textContent = `// Paste into createVehicle() in game.js
// Front wheels (steering)
vc.addWheel({x: -${fx}, y: ${fcy}, z: ${fz}}, {x:0,y:-1,z:0}, {x:-1,y:0,z:0}, ${sr}, ${wr});
vc.addWheel({x: ${fx}, y: ${fcy}, z: ${fz}}, {x:0,y:-1,z:0}, {x:-1,y:0,z:0}, ${sr}, ${wr});
// Rear wheels (drive)
vc.addWheel({x: -${rx}, y: ${rcy}, z: ${rz}}, {x:0,y:-1,z:0}, {x:-1,y:0,z:0}, ${sr}, ${wr});
vc.addWheel({x: ${rx}, y: ${rcy}, z: ${rz}}, {x:0,y:-1,z:0}, {x:-1,y:0,z:0}, ${sr}, ${wr});`;
}

// Bind sliders
document.querySelectorAll('#controls input[type="range"]').forEach(input => {
  input.addEventListener('input', () => {
    document.getElementById(input.id + 'v').textContent = input.value;
    if (input.id === 'cr' && carMesh) {
      // Rebuild car with new rotation
      carGroup.remove(carMesh);
      carMesh.rotation.y = parseFloat(input.value);
      const box = new THREE.Box3().setFromObject(carMesh);
      const center = box.getCenter(new THREE.Vector3());
      carMesh.position.set(0,0,0);
      carMesh.position.sub(center);
      carGroup.add(carMesh);
    }
    updateWheels();
  });
});

window.copyOutput = () => {
  navigator.clipboard.writeText(document.getElementById('output').textContent);
};

window.addEventListener('resize', () => {
  camera.aspect = (window.innerWidth - 320) / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth - 320, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
