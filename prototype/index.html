<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Jam 2026 — Visual Prototype</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; cursor: none; }
  canvas { display: block; }
  #ui {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(200, 180, 150, 0.6); font-family: 'Georgia', serif;
    font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
    pointer-events: none; user-select: none;
    text-shadow: 0 0 10px rgba(255, 150, 50, 0.3);
  }
  #cursor {
    position: fixed; width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255, 200, 100, 0.8); pointer-events: none;
    box-shadow: 0 0 10px rgba(255, 150, 50, 0.6), 0 0 20px rgba(255, 100, 30, 0.3);
    transform: translate(-50%, -50%); z-index: 1000;
  }
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #0a0a0a; color: rgba(200, 180, 150, 0.5); font-family: 'Georgia', serif;
    font-size: 18px; letter-spacing: 4px; z-index: 2000;
    transition: opacity 1s ease;
  }
  #loading.fade { opacity: 0; pointer-events: none; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="loading">AWAKENING...</div>
<div id="cursor"></div>
<div id="ui">WASD to move &middot; explore the ruins</div>
<script type="module" src="world.js"></script>
</body>
</html>
