<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Jam 2026 - Isometric World Prototype</title>
<style>
  :root {
    color-scheme: dark;
    --sky-top: #0d1730;
    --sky-mid: #17355e;
    --sky-bottom: #f3b987;
    --ink: rgba(248, 239, 220, 0.9);
    --muted: rgba(248, 239, 220, 0.52);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 18%, rgba(255, 233, 199, 0.26), transparent 24%),
      linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 46%, #29486e 68%, var(--sky-bottom) 100%);
    font-family: Georgia, "Times New Roman", serif;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.1), transparent 14%),
      radial-gradient(circle at 75% 12%, rgba(255, 255, 255, 0.08), transparent 10%),
      radial-gradient(circle at 82% 76%, rgba(255, 200, 122, 0.1), transparent 18%),
      linear-gradient(180deg, rgba(7, 12, 23, 0.12), rgba(7, 12, 23, 0.34));
    mix-blend-mode: screen;
  }

  #game {
    width: 100%;
    height: 100%;
  }

  #hud {
    position: fixed;
    left: 50%;
    bottom: 20px;
    transform: translateX(-50%);
    padding: 10px 18px;
    border: 1px solid rgba(248, 239, 220, 0.15);
    border-radius: 999px;
    background: rgba(9, 14, 27, 0.28);
    backdrop-filter: blur(10px);
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    pointer-events: none;
    text-shadow: 0 0 16px rgba(255, 196, 121, 0.35);
  }

  #title {
    position: fixed;
    top: 16px;
    left: 18px;
    color: var(--ink);
    pointer-events: none;
  }

  #title .name {
    font-size: 17px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  #title .sub {
    margin-top: 4px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  #veil {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle at 50% 36%, rgba(255, 217, 176, 0.12), transparent 20%),
      rgba(8, 11, 20, 0.9);
    color: var(--ink);
    z-index: 20;
    transition: opacity 900ms ease;
  }

  #veil.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #veil .panel {
    text-align: center;
    padding: 28px 34px;
    border: 1px solid rgba(248, 239, 220, 0.14);
    background: rgba(9, 14, 27, 0.42);
    backdrop-filter: blur(10px);
  }

  #veil .headline {
    font-size: 21px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  #veil .subline {
    margin-top: 10px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
</head>
<body>
<div id="game"></div>
<div id="title">
  <div class="name">Lowtide Sanctuary</div>
  <div class="sub">an isometric worldbuilding prototype</div>
</div>
<div id="hud">WASD or arrows to wander</div>
<div id="veil">
  <div class="panel">
    <div class="headline">Enter The Sanctuary</div>
    <div class="subline">sound begins on first input</div>
  </div>
</div>
<script type="module" src="game.js"></script>
</body>
</html>
